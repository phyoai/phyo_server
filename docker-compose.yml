version: '3.8'

services:
  phyo-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phyo-server
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      NODE_ENV: ${NODE_ENV:-development}
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      RAPID_API_KEY: ${RAPID_API_KEY}
      RAPID_API_HOST: ${RAPID_API_HOST}
      BRIGHT_DATA_API_TOKEN: ${BRIGHT_DATA_API_TOKEN}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - phyo-network
    # Optional: volumes for local development
    # volumes:
    #   - ./:/app
    #   - /app/node_modules

networks:
  phyo-network:
    driver: bridge
